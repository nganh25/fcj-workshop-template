```toml
baseURL = "https://nganh25.github.io/fcj-workshop-template/"
relativeURLs = false
canonifyURLs = false
defaultContentLanguage = "vi"

# Theme sử dụng khi build website
theme = "hugo-theme-learn"

# Cấu hình output để hỗ trợ tìm kiếm
[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
  # Có thể dùng: red, blue, green hoặc workshop
  themeVariant = "workshop"

  # Link repository GitHub
  editURL = "https://github.com/nganh25/fcj-workshop-template/edit/main/content/"

  description = "Internship Worklog"
  author = "nganh25"

  showVisitedLinks = true
  disableBreadcrumb = false
  disableNextPrev = false

[Languages]

[Languages.en]
title = "Internship Report"
weight = 1
languageName = "English"

[[Languages.en.menu.shortcuts]]
name = "<i class='fab fa-github'></i> GitHub Repository"
identifier = "github-repository-en"
url = "https://github.com/nganh25/fcj-workshop-template"
weight = 10

[[Languages.en.menu.shortcuts]]
name = "<i class='fab fa-aws'></i> AWS Study Group"
identifier = "aws-study-group-en"
url = "https://awsstudygroup.com"
weight = 20

[Languages.vi]
title = "Báo cáo thực tập"
weight = 2
languageName = "Tiếng Việt"

[[Languages.vi.menu.shortcuts]]
name = "<i class='fab fa-github'></i> GitHub Repository"
identifier = "github-repository-vi"
url = "https://github.com/nganh25/fcj-workshop-template"
weight = 10

[[Languages.vi.menu.shortcuts]]
name = "<i class='fab fa-aws'></i> AWS Study Group"
identifier = "aws-study-group-vi"
url = "https://awsstudygroup.com"
weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
```
