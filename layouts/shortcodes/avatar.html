{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "Avatar" -}}

<div style="text-align:center; margin:25px 0;">
  <img
    src="{{ $src | relURL }}"
    alt="{{ $alt }}"
    style="
      width:220px;
      height:220px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #294867;
    "
  >
</div>
